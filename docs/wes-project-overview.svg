<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">WES Autonomous Intelligence project overview</title>
  <desc id="desc">Visual overview of the WES workspace, autonomous runtime, memory, browser, tools, approvals and delivery pipeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#13223a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172a45"/>
      <stop offset="1" stop-color="#0e1c31"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5eead4"/>
    </marker>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <circle cx="1240" cy="80" r="210" fill="#1d4ed8" opacity="0.12"/>
  <circle cx="160" cy="760" r="260" fill="#0f766e" opacity="0.13"/>

  <text x="80" y="92" fill="#f8fafc" font-family="Inter,Arial,sans-serif" font-size="44" font-weight="700">WES Autonomous Intelligence</text>
  <text x="80" y="132" fill="#94a3b8" font-family="Inter,Arial,sans-serif" font-size="22">Workspace operativo per agenti AI con memoria, browser protetto, strumenti verificati e approvazioni umane.</text>

  <g filter="url(#shadow)">
    <rect x="80" y="190" width="1240" height="540" rx="34" fill="#0b1729" stroke="#29415f"/>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="120" y="245" width="240" height="150" rx="24" fill="url(#card)" stroke="#3b82f6"/>
    <text x="150" y="290" fill="#dbeafe" font-size="24" font-weight="700">Workspace</text>
    <text x="150" y="326" fill="#94a3b8" font-size="17">Obiettivi, file, CRM,</text>
    <text x="150" y="353" fill="#94a3b8" font-size="17">Skills e progetti.</text>

    <rect x="470" y="225" width="340" height="190" rx="28" fill="url(#card)" stroke="#5eead4" stroke-width="2"/>
    <text x="510" y="270" fill="#ccfbf1" font-size="26" font-weight="700">Runtime autonomo</text>
    <text x="510" y="309" fill="#94a3b8" font-size="17">Piano → esecuzione → checkpoint</text>
    <text x="510" y="338" fill="#94a3b8" font-size="17">retry → valutazione → replanning</text>
    <text x="510" y="367" fill="#94a3b8" font-size="17">ripresa sicura dopo riavvio</text>

    <rect x="920" y="245" width="280" height="150" rx="24" fill="url(#card)" stroke="#a78bfa"/>
    <text x="955" y="290" fill="#ede9fe" font-size="24" font-weight="700">Consegna</text>
    <text x="955" y="326" fill="#94a3b8" font-size="17">Report, PDF, eventi,</text>
    <text x="955" y="353" fill="#94a3b8" font-size="17">audit e risultati verificabili.</text>

    <rect x="120" y="500" width="250" height="150" rx="24" fill="url(#card)" stroke="#f59e0b"/>
    <text x="150" y="545" fill="#fef3c7" font-size="23" font-weight="700">Memoria</text>
    <text x="150" y="582" fill="#94a3b8" font-size="17">Contesto persistente,</text>
    <text x="150" y="609" fill="#94a3b8" font-size="17">recupero rilevante e storico.</text>

    <rect x="440" y="500" width="250" height="150" rx="24" fill="url(#card)" stroke="#06b6d4"/>
    <text x="470" y="545" fill="#cffafe" font-size="23" font-weight="700">Browser protetto</text>
    <text x="470" y="582" fill="#94a3b8" font-size="17">Allowlist, limiti azioni,</text>
    <text x="470" y="609" fill="#94a3b8" font-size="17">SSRF guard e stop sicuro.</text>

    <rect x="760" y="500" width="250" height="150" rx="24" fill="url(#card)" stroke="#22c55e"/>
    <text x="790" y="545" fill="#dcfce7" font-size="23" font-weight="700">Strumenti</text>
    <text x="790" y="582" fill="#94a3b8" font-size="17">Web, Python, CRM, email,</text>
    <text x="790" y="609" fill="#94a3b8" font-size="17">WhatsApp e agenda.</text>

    <rect x="1080" y="500" width="200" height="150" rx="24" fill="url(#card)" stroke="#ef4444"/>
    <text x="1110" y="545" fill="#fee2e2" font-size="23" font-weight="700">Approval gate</text>
    <text x="1110" y="582" fill="#94a3b8" font-size="17">Azioni esterne</text>
    <text x="1110" y="609" fill="#94a3b8" font-size="17">solo dopo consenso.</text>
  </g>

  <g stroke="#5eead4" stroke-width="4" fill="none" marker-end="url(#arrow)" opacity="0.9">
    <path d="M360 320 C410 320, 420 320, 470 320"/>
    <path d="M810 320 C860 320, 875 320, 920 320"/>
    <path d="M640 415 C640 455, 245 455, 245 500"/>
    <path d="M640 415 C640 455, 565 455, 565 500"/>
    <path d="M640 415 C640 455, 885 455, 885 500"/>
    <path d="M640 415 C640 455, 1180 455, 1180 500"/>
  </g>

  <text x="80" y="780" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="16">Stato illustrato: architettura reale del repository, non mockup dell'interfaccia.</text>
</svg>