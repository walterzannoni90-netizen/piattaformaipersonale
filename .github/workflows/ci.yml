name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install --requirement requirements.txt
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
      - run: git diff --exit-code -- app/public/css/tailwind.css

  container:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag wes-autonomous:test .
